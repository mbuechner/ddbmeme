[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:memegen]
command=/bin/sh -c "exec gunicorn --bind 127.0.0.1:5001 --worker-tmp-dir /tmp --worker-class uvicorn.workers.UvicornWorker --workers ${WEB_CONCURRENCY:-${MEMEGEN_WORKERS:-1}} --max-requests ${MAX_REQUESTS:-${MEMEGEN_MAX_REQUESTS:-200}} --max-requests-jitter ${MAX_REQUESTS_JITTER:-${MEMEGEN_MAX_REQUESTS_JITTER:-30}} --timeout ${TIMEOUT:-${MEMEGEN_GUNICORN_TIMEOUT:-180}} app.main:app 2>&1 | awk '{print \"[Memegen] \" $0}'"
directory=/home/memegen
environment=HOME="/tmp",TMPDIR="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=unexpected
exitcodes=0
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
priority=100

[program:ddbmeme]
command=/bin/sh -c "i=0; echo '[Startup] waiting for memegen at http://127.0.0.1:5001/test'; while [ \"$i\" -lt \"30\" ]; do if curl -fsS --max-time 5 'http://127.0.0.1:5001/test' >/dev/null 2>&1; then echo '[Startup] memegen is ready'; break; fi; i=$((i+1)); sleep 2; done; if [ \"$i\" -ge \"30\" ]; then echo '[Startup] memegen readiness wait timed out; continuing startup'; fi; if [ \"${MEMEGEN_PREWARM_ENABLED:-1}\" = \"1\" ]; then echo '[Startup] prewarming memegen'; if curl -fsS --max-time 30 'http://127.0.0.1:5001/images/fry/warmup/_.jpg' >/dev/null 2>&1; then echo '[Startup] memegen prewarm succeeded'; else echo '[Startup] memegen prewarm failed (continuing)'; fi; fi; exec gunicorn --bind 0.0.0.0:8080 --worker-tmp-dir /tmp --workers ${GUNICORN_WORKERS:-1} --threads ${GUNICORN_THREADS:-2} --timeout ${GUNICORN_TIMEOUT:-180} --access-logfile - --error-logfile - ddbmeme.wsgi:application 2>&1 | awk '!/\/healthz/ {print \"[DDBmeme] \" $0}'"
directory=/home/ddbmeme
environment=HOME="/tmp",TMPDIR="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=unexpected
exitcodes=0
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
priority=200

[eventlistener:processes]
command=/bin/sh -c "printf 'READY\n' && while read line; do kill -SIGQUIT $PPID; done < /dev/stdin"
events=PROCESS_STATE_FATAL

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:memegen]
command=/bin/sh -c "exec gunicorn --bind 127.0.0.1:5001 --worker-tmp-dir /tmp --worker-class uvicorn.workers.UvicornWorker --max-requests 0 --max-requests-jitter 0 --timeout 25 app.main:app 2>&1 | awk '{print \"[Memegen] \" $0}'"
directory=/home/memegen
environment=HOME="/tmp",TMPDIR="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=unexpected
exitcodes=0
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
priority=100

[program:ddbmeme]
command=/bin/sh -c "exec gunicorn --bind 0.0.0.0:8080 --worker-tmp-dir /tmp --workers ${GUNICORN_WORKERS:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-180} --access-logfile - --error-logfile - ddbmeme.wsgi:application 2>&1 | awk '!/\/healthz/ {print \"[DDBmeme] \" $0}'"
directory=/home/ddbmeme
environment=HOME="/tmp",TMPDIR="/tmp"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=unexpected
exitcodes=0
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
priority=200

[eventlistener:processes]
command=/bin/sh -c "printf 'READY\n' && while read line; do kill -SIGQUIT $PPID; done < /dev/stdin"
events=PROCESS_STATE_FATAL
